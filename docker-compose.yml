version: '3.3'

services:
  mcp-registry:
    build: .
    image: mcp-registry:latest
    restart: always
    environment:
      PORT: "8080"
      ADMIN_API_KEY: ${ADMIN_API_KEY}
    networks:
      - default
    labels:
      - "traefik.enable=true"

      - "traefik.http.services.mcp-registry.loadbalancer.server.port=8080"

      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=web-secure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${PROJECT_HOST_NAME}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=le"

networks:
  default:
    external:
      name: osinet
 