# Example nginx reverse-proxy for the MCP registry.
#
# Terminates TLS for your domain and forwards to the Express app (port 8080).
# Adjust server_name, certificate paths, and upstream host to your environment.
# CORS is also added here as a safety net; the app already sets these headers.

upstream mcp_registry {
    server 127.0.0.1:8080;
    # If running via docker-compose on the same network, use the service name:
    # server mcp-registry:8080;
}

server {
    listen 443 ssl;
    http2 on;
    server_name mcp-registry.yourdomain.com;

    ssl_certificate     /etc/nginx/certs/mcp-registry.crt;
    ssl_certificate_key /etc/nginx/certs/mcp-registry.key;

    # Restrict to GitHub's egress ranges if you want defense-in-depth.
    # GitHub publishes these at https://api.github.com/meta (the "hooks"/"actions"
    # ranges are a good starting point). Example:
    # allow 140.82.112.0/20;
    # deny all;

    location /v0.1/servers {
        # CORS (mirrors what the app sets).
        add_header Access-Control-Allow-Origin  "*"                       always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS"            always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass         http://mcp_registry;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /healthz {
        proxy_pass http://mcp_registry;
    }
}

# Optional: redirect HTTP to HTTPS.
server {
    listen 80;
    server_name mcp-registry.yourdomain.com;
    return 301 https://$host$request_uri;
}
